cmd_topic: /cmd_vel
scan_topic: /scan
image_topic: /camera/color/image_raw
camera_info_topic: /camera/color/camera_info
depth_topic: /camera/aligned_depth_to_color/image_raw
gripper_service: /gripper/set
gripper_holding_topic: /gripper/holding_object

expected_colors: [red, green, blue]
marker_id_to_color:
  "1": red
  "2": green
  "3": blue

aruco_dictionary: DICT_4X4_50
marker_size_m: 0.05
use_camera_info_intrinsics: true
hfov_deg: 70.0
min_aruco_perimeter_px: 70.0
marker_stale_s: 0.5
puck_stale_s: 0.5
puck_conf_min: 0.45

control_rate_hz: 20.0
search_angular_speed_rad_s: 0.35
max_linear_speed_m_s: 0.10
max_angular_speed_rad_s: 0.55
kp_yaw: 1.8
kp_depth: 0.8
lateral_deadband_m: 0.025
depth_deadband_m: 0.025
align_hold_s: 0.25

pickup_target_depth_m: 0.24
marker_place_distance_m: 0.45
search_timeout_s: 25.0
approach_timeout_s: 12.0
place_search_timeout_s: 60.0

wall_safety_enabled: true
front_stop_distance_m: 0.18
front_slow_distance_m: 0.35
scan_front_angle_deg: 38.0
sensor_stale_s: 0.6
depth_safety_enabled: true
depth_safety_percentile: 20.0
depth_safety_min_valid_fraction: 0.05
depth_roi_x_min: 0.35
depth_roi_x_max: 0.65
depth_roi_y_min: 0.35
depth_roi_y_max: 0.78

require_holding_feedback: false
grasp_close_wait_s: 0.7
place_open_wait_s: 0.6
retreat_after_pick_s: 1.0
retreat_after_place_s: 1.0
retreat_speed_m_s: 0.07
mission_timeout_s: 900.0
hold_terminal_state: true
