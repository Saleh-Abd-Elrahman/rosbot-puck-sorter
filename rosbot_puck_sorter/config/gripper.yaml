backend: rosserial_topic
servo_topic: /servo
servo_load_topic: /servoLoad
require_servo_subscriber: true
servo_subscriber_wait_s: 2.0
use_load_feedback: false
load_feedback_threshold_ma: 120.0
load_feedback_timeout_s: 2.0

serial_port: /dev/ttyUSB0
serial_baud_rate: 115200
serial_timeout_s: 0.3
startup_delay_s: 2.0
command_timeout_s: 1.0

# Retained for pigpio fallback and pulse conversion.
pwm_driver: rosserial_topic
pwm_channel: 0
pwm_frequency_hz: 50
min_pulse_us: 500
max_pulse_us: 2500
open_angle_deg: 0.0
close_angle_deg: 170.0
settle_time_s: 0.4
invert_direction: false
open_on_shutdown: true
