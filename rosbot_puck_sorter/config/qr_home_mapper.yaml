corner_waypoints:
  - {x: 0.40, y: 0.40, yaw: 0.0}
  - {x: 4.60, y: 0.40, yaw: 1.57}
  - {x: 0.40, y: 3.60, yaw: -1.57}
marker_mode: aruco
aruco_dictionary: DICT_4X4_50
aruco_id_to_color:
  "0": red
  "1": green
  "2": blue
qr_expected_codes: [HOME_RED, HOME_GREEN, HOME_BLUE]
scan_timeout_s: 12.0
scan_retries: 2
yaw_tolerance_rad: 0.20
marker_size_m: 0.05
min_aruco_perimeter_px: 80.0
max_marker_distance_m: 0.0
use_camera_info_intrinsics: true
fx: 0.0
fy: 0.0
cx: 0.0
cy: 0.0
hfov_deg: 70.0
stable_reads_required: 3
image_topic: /camera/color/image_raw
camera_info_topic: /camera/color/camera_info
map_frame: odom
start_frame: start
publish_start_relative: true
odom_frame: odom
base_frame: base_link
nav_pose_source: odom
pose_topic: /amcl_pose
odom_topic: /odom
cmd_topic: /cmd_vel
goal_xy_tolerance_m: 0.12
goal_yaw_tolerance_rad: 0.20
nav_control_rate_hz: 20.0
nav_max_linear_speed_m_s: 0.16
nav_max_angular_speed_rad_s: 0.9
nav_linear_kp: 0.7
nav_angular_kp: 1.8
nav_drive_angular_kp: 1.2
nav_rotate_in_place_threshold_rad: 0.45
nav_slowing_distance_m: 0.45
nav_success_hold_s: 0.20
nav_pose_wait_timeout_s: 2.0
nav_pose_stale_timeout_s: 3.0
nav_allow_open_loop_fallback: true
nav_open_loop_linear_speed_m_s: 0.16
nav_open_loop_angular_speed_rad_s: 0.45
nav_open_loop_distance_scale: 1.0
nav_open_loop_turn_scale: 1.0
